# ATXCore Guide
# This file is a reference for plugin owners and future ATXCore addon plugins.
# ATXCore itself does not automatically run this file.

about:
  plugin: "ATXCore"
  purpose: "Reusable core mechanics for future plugins: effects, triggers, mutators, filters, conditions, placeholders, and integrations."
  mechanic_ids:
    format: "Built-in mechanic IDs are plain names."
    examples:
      - "message"
      - "damage"
      - "set_max_health"
      - "vault_deposit"
    note: "Future plugins may still register namespaced IDs like myplugin:custom_effect if they want."

addon_plugin_setup:
  plugin_yml:
    depend:
      - "ATXCore"
    softdepend:
      - "PlaceholderAPI"
      - "Vault"
  java_api_lookup: |
    ATXCoreApi api = Bukkit.getServicesManager().load(ATXCoreApi.class);
    if (api == null) {
        getLogger().severe("ATXCore is not loaded.");
        getServer().getPluginManager().disablePlugin(this);
        return;
    }
  triggered_pipeline_example: |
    Trigger trigger = api.registries().triggers().get("melee_attack").orElseThrow();
    Effect<?> damage = api.registries().effects().get("damage").orElseThrow();
    Mutator<?> targetVictim = api.registries().mutators().get("target_victim").orElseThrow();
    Filter<?> noCreepers = api.registries().filters().get("not_target_entity_type").orElseThrow();

    MechanicPipeline pipeline = new MechanicPipeline()
        .condition(actorHealthAbove)
        .mutator(targetVictim)
        .filter(noCreepers)
        .effect(damage);

    new TriggeredPipeline(trigger, pipeline).start();
  eco_style_loader_example: |
    TriggeredPipeline pipeline = api.mechanicLoader().loadTriggeredPipeline(config.getConfigurationSection("chains.bleed-hit"));
    pipeline.start();

eco_style_yaml:
  explanation: "This is the recommended format for future ATXCore-based plugins. It mirrors the eco-style idea: trigger, conditions, mutators, filters, effects."
  important_rules:
    - "Each list item has an id."
    - "Each list item can have data. That data is local to that condition/filter/mutator/effect."
    - "Trigger/event data is separate and can be read with {data.key}."
    - "Mutators choose the active target before filters and effects run."
  example:
    chains:
      bleed-hit:
        trigger: "melee_attack"
        conditions:
          - id: "actor_health_above"
            data:
              amount: 20
        mutators:
          - id: "target_victim"
        filters:
          - id: "not_target_entity_type"
            data:
              type: "minecraft:creeper"
        effects:
          - id: "damage"
            data:
              amount: 4
          - id: "message"
            data:
              message: "&c{actor} made you bleed for 4 damage."

context_data:
  explanation: "Context data is temporary key-value data attached to one trigger run. Triggers add event data, mutators change it, conditions/filters read it, effects consume it, and placeholders can print it."
  lifetime: "Context data exists only while one pipeline is running. It is not saved to disk and is not shared globally."
  where_it_comes_from:
    - "Triggers add event-specific values. Example: block_break adds block_type and exp."
    - "Mutators add or change values. Example: set_data writes any key/value pair."
    - "Addon plugins can add data when they build an ExecutionContext in Java."
  how_to_read_it:
    placeholder: "{data.key_name}"
    java: "context.stringData(\"key_name\")"
  common_keys:
    actor_type: "Entity type that caused the trigger, such as PLAYER, ZOMBIE, or ARROW."
    target_type: "Entity type the trigger is about, such as PLAYER, CREEPER, or ZOMBIE."
    active_type: "Entity type currently selected for effects after mutators run."
    message: "Text for message, broadcast, title, action bar, delayed_message."
    command: "Command for console_command, player_command, op_command, delay_console_command, repeat_console_command."
    amount: "Number used by health, damage, food, money, stats, and many other effects."
    world: "World name for teleport, world filters, and location building."
    x: "X coordinate."
    y: "Y coordinate."
    z: "Z coordinate."
    type: "Potion type or entity type depending on the mechanic."
    material: "Minecraft material name such as DIAMOND or STONE."
    stat: "Bukkit statistic name such as JUMP, PLAY_ONE_MINUTE, DAMAGE_DEALT."
    attribute: "Bukkit attribute name from the Spigot Attribute docs, such as MAX_HEALTH, ATTACK_DAMAGE, MOVEMENT_SPEED, SCALE, or BLOCK_INTERACTION_RANGE."

pipeline_order:
  - "A trigger creates a context with an actor, target, location, event, and event data."
  - "Conditions run first. They decide whether the trigger is allowed to continue, usually checking the actor/user."
  - "Mutators run second. They change data or select the active target for effects."
  - "Filters run third. Generic filters check the active context, while actor_* and target_* filters check the original actor or target."
  - "Effects run last."

actor_target_model:
  actor: "The entity that caused the trigger. In melee_attack this is the attacker."
  target: "The entity the trigger is about. In melee_attack this is the victim."
  active_target: "The entity that effects currently hit. Mutators such as target_victim and target_attacker change this."
  default_behavior:
    melee_attack: "Active target starts as the attacker. Add target_victim before effects to hit the victim instead."
    entity_damage_by_entity: "Active target starts as the damaged entity."
    player_triggers: "Actor, target, and active target are usually the same player."

examples:
  welcome_message:
    description: "Send a player a message when your addon receives a player context."
    effects:
      - id: "message"
        data:
          message: "&aWelcome, {player}!"

  reward_money_with_vault:
    description: "Only give money if Vault and an economy provider are installed."
    filters:
      - id: "player_only"
    effects:
      - id: "vault_deposit"
        data:
          amount: 250
      - id: "message"
        data:
          message: "&6You received $250. Balance: {vault_balance_formatted}"

  damage_and_sound:
    description: "Damage the player and play a sound."
    conditions:
      - id: "health_above"
        data:
          amount: 4
    effects:
      - id: "damage"
        data:
          amount: 2
      - id: "sound"
        data:
          sound: "ENTITY_PLAYER_HURT"
          volume: 1
          pitch: 1

  melee_attack_damage_victim_except_creepers:
    description: "On melee attack, require the attacker to be above 20 health points, switch effects to the victim, block creepers, then damage the victim."
    trigger: "melee_attack"
    conditions:
      - id: "actor_health_above"
        data:
          amount: 20
    mutators:
      - id: "target_victim"
    filters:
      - id: "not_target_entity_type"
        data:
          type: "minecraft:creeper"
    effects:
      - id: "damage"
        data:
          amount: 4
      - id: "sound"
        data:
          sound: "ENTITY_PLAYER_ATTACK_CRIT"
          volume: 1
          pitch: 1

  temporary_stat_build:
    description: "Modify Minecraft combat stats/attributes."
    filters:
      - id: "player_only"
    effects:
      - id: "set_max_health"
        data:
          amount: 40
      - id: "set_attack_damage"
        data:
          amount: 8
      - id: "set_movement_speed"
        data:
          amount: 0.14
      - id: "set_scale"
        data:
          amount: 1.1
      - id: "add_absorption"
        data:
          amount: 6

  statistic_tracking:
    description: "Change Bukkit statistics."
    effects:
      - id: "increment_stat"
        data:
          stat: "JUMP"
          amount: 10
      - id: "set_stat"
        data:
          stat: "DAMAGE_DEALT"
          amount: 100

  data_mutation:
    description: "Use mutators to prepare data before effects."
    mutators:
      - id: "random_int_data"
        data:
          key: "reward"
          min: 50
          max: 250
      - id: "set_message"
        data:
          message: "&aReward rolled: {data.reward}"
    effects:
      - id: "message"

  explicit_context_data:
    description: "set_data writes a temporary key into the current pipeline context."
    mutators:
      - id: "set_data"
        data:
          key: "reward_name"
          value: "Daily Crate"
    effects:
      - id: "message"
        data:
          message: "&aYou received: {data.reward_name}"

placeholders:
  internal_format: "{placeholder}"
  papi_format: "%atxcore_placeholder%"
  math_note: "ATXCore replaces placeholders but does not evaluate math expressions in generic addon YAML. ATXRunes evaluates rune math first, then passes the resolved number or text into ATXCore."
  examples:
    internal:
      - "{player}"
      - "{world}"
      - "{player_health}"
      - "{vault_balance}"
      - "{data.reward}"
    placeholderapi:
      - "%atxcore_player%"
      - "%atxcore_world%"
      - "%atxcore_vault_balance%"
  common:
    player:
      - "{player}"
      - "{player_uuid}"
      - "{player_display}"
    location:
      - "{world}"
      - "{x}"
      - "{y}"
      - "{z}"
    stats:
      - "{player_health}"
      - "{player_max_health}"
      - "{player_food}"
      - "{player_level}"
    economy:
      - "{vault_balance}"
      - "{vault_balance_formatted}"
    context_data:
      - "{data.key_name}"
  note: "The PlaceholderAPI prefix remains atxcore because PAPI needs a plugin identifier."

integrations:
  PlaceholderAPI:
    enabled_in_config: "integrations.PlaceholderAPI.enabled"
    provides:
      - "External PlaceholderAPI placeholder parsing through PlaceholderService."
      - "ATXCore placeholders as %atxcore_<placeholder>%."
  Vault:
    enabled_in_config: "integrations.Vault.enabled"
    requires:
      - "Vault plugin"
      - "An economy plugin registered with Vault"
    provides:
      - "vault_deposit"
      - "vault_withdraw"
      - "vault_set_balance"
      - "vault_has_money"
      - "vault_balance_at_least"
      - "{vault_balance}"
      - "{vault_balance_formatted}"

